<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lohnsystem v0.5.03</title>
  <style>
    body { margin: 0; font-family: Arial; background: #f3f3f3; display: flex; flex-direction: column; min-height: 100vh; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; background: #fff; border-bottom: 1px solid #ccc; }
    .title { font-weight: bold; font-size: 1.3rem; }
    .lang-select { font-size: 1rem; }
    main { display: flex; flex: 1; justify-content: center; align-items: center; padding: 2rem; }
    .card { width: 100%; max-width: 400px; background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 0 8px rgba(0,0,0,0.1); }
    .card h2 { margin-top: 0; }
    .form input { width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; }
    .form button { width: 100%; padding: 0.5rem; margin-top: 0.5rem; }
    .toggle { text-align: center; margin-top: 1rem; cursor: pointer; color: #0077cc; }
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 2.5rem; }
    .password-wrapper span {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      cursor: pointer; font-size: 1rem;
    }
    footer { font-size: 0.8rem; color: #666; text-align: center; margin: 1rem 0; }
  </style>
</head>
<body>
<header>
  <div class="title">Brutto-Netto Lohn im Blick</div>
  <select class="lang-select">
    <option value="de">🇩🇪 Deutsch</option>
    <option value="en">🇬🇧 English</option>
  </select>
</header>
<main>
  <div class="card">
    <form class="form" id="login-form" action="/login" method="post">
      <h2>Einloggen</h2>
      <input type="text" name="username" placeholder="Benutzername oder E-Mail" required />
      <div class="password-wrapper">
        <input type="password" id="login-pass" name="password" placeholder="Passwort" required />
        <span onclick="togglePassword('login-pass')">👁️</span>
      </div>
      <button type="submit">Einloggen</button>
    </form>
    <form class="form" id="register-form" style="display:none" action="/register" method="post">
      <h2>Registrieren</h2>
      <input type="text" name="username" placeholder="Benutzername" required />
      <input type="email" name="email" placeholder="E-Mail" required />
      <div class="password-wrapper">
        <input type="password" id="reg-pass" name="password" placeholder="Passwort" required />
        <span onclick="togglePassword('reg-pass')">👁️</span>
      </div>
      <button type="submit">Registrieren</button>
    </form>
    <div class="toggle" onclick="toggleForm('register')" id="toRegister">Noch kein Konto? Jetzt registrieren</div>
    <div class="toggle" onclick="toggleForm('login')" id="toLogin" style="display:none">Schon registriert? Jetzt einloggen</div>
  </div>
</main>
<footer>Lohnsystem Version v0.5.03</footer>
<script>
  function toggleForm(target) {
    document.getElementById('login-form').style.display = (target === 'login') ? 'block' : 'none';
    document.getElementById('register-form').style.display = (target === 'register') ? 'block' : 'none';
    document.getElementById('toLogin').style.display = (target === 'register') ? 'block' : 'none';
    document.getElementById('toRegister').style.display = (target === 'login') ? 'block' : 'none';
  }
  function togglePassword(id) {
    const input = document.getElementById(id);
    input.type = input.type === "password" ? "text" : "password";
  }
</script>
</body>
</html>
