
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lohnsystem v0.5.01</title>
  <style>
    body { margin: 0; font-family: Arial; display: flex; min-height: 100vh; flex-direction: column; }
    main { flex: 1; display: flex; }
    .left { flex: 1; background: #f8f8f8; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; padding: 1rem; }
    .right { flex: 1; display: flex; align-items: center; justify-content: center; }
    .card { width: 100%; max-width: 360px; padding: 2rem; border: 1px solid #ccc; border-radius: 8px; background: white; }
    .flags { position: absolute; top: 1rem; right: 1rem; }
    .flags select { font-size: 1rem; }
    .form input { width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; }
    .form button { width: 100%; padding: 0.5rem; }
    footer { font-size: 0.8rem; color: #666; text-align: center; margin: 1rem 0; }
  </style>
</head>
<body>
<div class="flags">
  <select>
    <option value="de">🇩🇪 Deutsch</option>
    <option value="en">🇬🇧 English</option>
  </select>
</div>
<main>
  <div class="left">
    <strong>Brutto-Netto Lohn im Blick</strong>
  </div>
  <div class="right">
    <div class="card">
      <form class="form" action="/login" method="post">
        <input type="text" name="username" placeholder="E-Mail oder Benutzername" required />
        <input type="password" name="password" placeholder="Passwort" required />
        <button type="submit">Login</button>
      </form>
      <hr />
      <form class="form" action="/register" method="post">
        <input type="text" name="username" placeholder="Benutzername" required />
        <input type="email" name="email" placeholder="E-Mail" required />
        <input type="password" name="password" placeholder="Passwort" required />
        <button type="submit">Registrieren</button>
      </form>
    </div>
  </div>
</main>
<footer>Lohnsystem Version v0.5.01</footer>
</body>
</html>
