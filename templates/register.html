
<h2>Registrieren</h2>
<form method="POST">
  <input name="username" placeholder="Benutzername" required><br>
  <input name="email" placeholder="E-Mail" required><br>
  <input name="password" type="password" placeholder="Passwort" required><br>
  <select name="language" required>
    <option value="de">Deutsch</option>
    <option value="en">English</option>
  </select><br>
  <select name="state" required>
    <option value="Sachsen">Sachsen</option>
    <option value="Thüringen">Thüringen</option>
    <option value="Bayern">Bayern</option>
  </select><br>
  <select name="insurance" required>
    <option value="TK">TK</option>
    <option value="AOK">AOK</option>
    <option value="Barmer">Barmer</option>
    <option value="DAK">DAK</option>
    <option value="IKK classic">IKK classic</option>
  </select><br>
  <button type="submit">Konto erstellen</button>
</form>
