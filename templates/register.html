
<!DOCTYPE html>
<html lang="de">
<head><meta name="viewport" content="width=device-width, initial-scale=1"><title>Registrieren</title></head>
<body>
<h2>Registrieren</h2>
<form method="POST">
  <input name="username" placeholder="Benutzername" required><br>
  <input name="email" placeholder="E-Mail" required><br>
  <input name="password" type="password" placeholder="Passwort" required><br>
  <select name="language" required>
    <option value="de">Deutsch</option>
    <option value="en">English</option>
  </select><br>
  <select name="state" required>
    <option value="SN">Sachsen</option>
    <option value="TH">Thueringen</option>
    <option value="BY">Bayern</option>
  </select><br>
  <button type="submit">Konto erstellen</button>
</form>
</body>
</html>
