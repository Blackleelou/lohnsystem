
<!DOCTYPE html>
<html>
<head><title>Login</title></head>
<body>
<h2>Anmeldung</h2>
<form method="POST">
  <input name="username" placeholder="Benutzername" required><br>
  <input name="password" type="password" placeholder="Passwort" required><br>
  <label><input type="checkbox" name="remember"> Angemeldet bleiben</label><br>
  <button type="submit">Einloggen</button><br>
  <a href="#">Passwort vergessen?</a> | <a href="#">Registrieren</a>
</form>
</body>
</html>
